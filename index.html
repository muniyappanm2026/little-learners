<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Little Learners</title>
<style>
  :root{
    --cream:#FFF7E8;
    --ink:#3A3230;
    --coral:#FF7A6E;
    --sky:#4FB4E8;
    --grass:#5EC46A;
    --sun:#FFC33D;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none;}
  html,body{
    margin:0; height:100%; overflow:hidden;
    background: radial-gradient(circle at 20% 0%, #FFFDF6 0%, var(--cream) 55%, #FFEFC9 100%);
    font-family: "Segoe UI Rounded","SF Pro Rounded","Trebuchet MS",Verdana,sans-serif;
    color: var(--ink);
  }
  .wrap{
    height:100%; display:flex; flex-direction:column; align-items:center;
    padding: clamp(16px,3vh,40px) clamp(16px,4vw,50px);
  }
  .hero{ text-align:center; margin-bottom: clamp(10px,2vh,20px); }
  .mascot{
    width: clamp(80px,10vw,120px);
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-10px) rotate(3deg);} }
  h1{
    font-size: clamp(28px,5vw,48px);
    margin: 6px 0 4px;
    letter-spacing: .5px;
  }
  .hero p{
    font-size: clamp(14px,2vw,19px);
    color:#8a7d78; margin:0;
  }

  .cards{
    flex:1; width:100%; max-width:1100px;
    display:grid; grid-template-columns: repeat(3, 1fr); gap: clamp(14px,2.4vw,28px);
    align-items:stretch; min-height:0;
    padding-top: clamp(10px,2vh,16px);
  }
  .card{
    border-radius:32px; padding: clamp(18px,3vh,30px) clamp(16px,2.4vw,26px);
    display:flex; flex-direction:column; align-items:center; text-align:center;
    text-decoration:none; color:var(--ink);
    box-shadow: 0 10px 0 rgba(58,50,48,0.12), 0 2px 18px rgba(58,50,48,0.08);
    border:6px solid transparent;
    transition: transform .12s ease;
    position:relative;
    overflow:hidden;
  }
  .card:active{ transform: translateY(6px); box-shadow: 0 4px 0 rgba(58,50,48,0.12); }

  .card.c1{ background:#FFF3D6; border-color:#FFE3A6; }
  .card.c2{ background:#E4F4FF; border-color:#CDE9FA; }
  .card.c3{ background:#E9FBE6; border-color:#D3F0CC; }

  .card .icon{
    font-size: clamp(46px,8vw,80px);
    margin-bottom: 8px;
    filter: drop-shadow(0 5px 0 rgba(0,0,0,0.08));
  }
  .card h2{ font-size: clamp(19px,2.6vw,26px); margin: 4px 0 6px; }
  .card p{ font-size: clamp(13px,1.7vw,16px); color:#6b5f5a; margin:0 0 auto; line-height:1.4; }

  .start-pill{
    margin-top: 16px;
    font-weight:800; font-size: clamp(14px,1.8vw,18px);
    padding: 12px 26px; border-radius:20px; color:#fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.14);
  }
  .card.c1 .start-pill{ background: var(--coral); }
  .card.c2 .start-pill{ background: var(--sky); }
  .card.c3 .start-pill{ background: var(--grass); }

  .badge{
    position:absolute; top:14px; right:16px;
    font-size: clamp(11px,1.4vw,13px); font-weight:800;
    background:rgba(255,255,255,0.7); padding:4px 10px; border-radius:12px;
    color:#8a7d78;
  }

  footer.note{
    padding-top: clamp(10px,2vh,18px);
    font-size: clamp(11px,1.4vw,14px);
    color:#a5988f; text-align:center;
  }

  @media (max-width: 760px){
    .cards{ grid-template-columns: 1fr; grid-auto-rows: 1fr; overflow-y:auto; }
    html, body{ overflow:auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <svg class="mascot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="60" rx="34" ry="26" fill="#FFFFFF" stroke="#E7D6BE" stroke-width="3"/>
      <circle cx="30" cy="48" r="18" fill="#FFFFFF" stroke="#E7D6BE" stroke-width="3"/>
      <circle cx="70" cy="48" r="18" fill="#FFFFFF" stroke="#E7D6BE" stroke-width="3"/>
      <circle cx="50" cy="38" r="22" fill="#FFFFFF" stroke="#E7D6BE" stroke-width="3"/>
      <circle cx="41" cy="38" r="4.2" fill="#3A3230"/>
      <circle cx="60" cy="38" r="4.2" fill="#3A3230"/>
      <path d="M42 48 Q50 55 58 48" stroke="#3A3230" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="33" cy="45" r="4" fill="#FFB4A8" opacity=".7"/>
      <circle cx="68" cy="45" r="4" fill="#FFB4A8" opacity=".7"/>
    </svg>
    <h1>Little Learners</h1>
    <p>Tap a lesson to start!</p>
  </div>

  <div class="cards">
    <a class="card c1" href="lesson1_letter_tracing.html">
      <div class="badge">Letters</div>
      <div class="icon">✏️</div>
      <h2>Trace the Letter</h2>
      <p>Trace A, B and C with your stylus</p>
      <div class="start-pill">Start ▶</div>
    </a>

    <a class="card c2" href="lesson2_shape_sorter.html">
      <div class="badge">Shapes</div>
      <div class="icon">🔺</div>
      <h2>Shape Sorter</h2>
      <p>Drag each shape into its matching home</p>
      <div class="start-pill">Start ▶</div>
    </a>

    <a class="card c3" href="lesson3_counting.html">
      <div class="badge">Numbers</div>
      <div class="icon">🔢</div>
      <h2>Let's Count!</h2>
      <p>Tap and count pictures from 1 to 5</p>
      <div class="start-pill">Start ▶</div>
    </a>
  </div>

  <footer class="note">Made for little hands &amp; big smiles 🌈</footer>
</div>
</body>
</html>
